<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invisible Text Steganography</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Invisible Text Steganography</h1>
        <p class="hint">
          Upload an image or PDF, drag to select an area, then embed hidden text.
          The encoder only flips least-significant color bits, so edits stay visually
          camouflaged even on mixed black/white backgrounds.
        </p>

        <label class="field-label" for="fileInput">Source file</label>
        <input id="fileInput" type="file" accept="image/*,.pdf,application/pdf" />

        <div class="row">
          <button id="prevPage" type="button" disabled>Prev Page</button>
          <span id="pageInfo">Page -/-</span>
          <button id="nextPage" type="button" disabled>Next Page</button>
        </div>

        <label class="field-label" for="secretText">Hidden text</label>
        <textarea id="secretText" rows="6" placeholder="Type the text to hide inside the selected area..."></textarea>

        <div class="controls-row">
          <label class="field-label" for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="text-layer">PDF text layer (selectable)</option>
            <option value="image-ocr">Image layer (OCR)</option>
            <option value="lsb">LSB steganography (legacy)</option>
          </select>

          <label class="field-label" for="colorPicker">Text color</label>
          <input id="colorPicker" type="color" value="#ffffff" />

          <label class="field-label"><input id="autoDetectBg" type="checkbox" checked /> Auto-detect background</label>
        </div>

        <div class="row">
          <button id="embedBtn" type="button">Embed Invisible Text</button>
          <button id="clearSelectionBtn" type="button">Clear Selection</button>
          <button id="downloadBtn" type="button">Download Result</button>
        </div>

        <p id="status" class="status">Load a file to begin.</p>
      </section>

      <section class="workspace">
        <canvas id="editorCanvas" width="960" height="640"></canvas>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
